<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBank Cloud Pro - Đồng bộ thời gian thực</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-0 sm:p-4 font-sans">

    <div class="w-full max-w-md bg-white min-h-screen sm:min-h-[820px] sm:rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col relative border border-slate-800/50">
        <div class="bg-slate-950 text-white px-6 pt-3 pb-2 flex justify-between items-center text-xs font-semibold tracking-wider select-none">
            <span id="clock">00:00</span>
            <div class="flex items-center gap-2 text-[10px]">
                <i class="fa-solid fa-signal"></i><span class="text-[9px]">5G</span><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full text-emerald-400"></i>
            </div>
        </div>

        <div id="screen-auth" class="flex-1 flex flex-col p-6 justify-between bg-white">
            <div class="my-auto space-y-6">
                <div class="text-center">
                    <div class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-indigo-800 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-xl shadow-indigo-200 mb-3">
                        <i class="fa-solid fa-building-columns"></i>
                    </div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tight">SmartBank Cloud v2.1</h1>
                    <p class="text-slate-400 text-xs mt-0.5">Hệ thống liên kết thiết bị thời gian thực</p>
                </div>

                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button id="btn-tab-login" onclick="toggleAuthMode('login')" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white text-indigo-600 shadow-sm transition-all">Đăng Nhập</button>
                    <button id="btn-tab-reg" onclick="toggleAuthMode('reg')" class="flex-1 py-2 text-xs font-medium rounded-lg text-slate-500 transition-all">Mở Tài Khoản mới</button>
                </div>

                <div id="form-login" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Số Tài Khoản</label>
                        <input type="text" id="login-stk" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 font-mono font-bold text-slate-800" placeholder="Nhập STK đã đăng ký">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Mật khẩu</label>
                        <input type="password" id="login-pass" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-slate-800" placeholder="••••••••">
                    </div>
                    <button onclick="authLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 transition-all text-sm">
                        Đăng Nhập Vào Thiết Bị
                    </button>
                </div>

                <div id="form-reg" class="space-y-4 hidden">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Tên Chủ Tài Khoản (Viết chữ hoa không dấu)</label>
                        <input type="text" id="reg-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 uppercase font-bold text-slate-800" placeholder="VD: NGUYEN VAN A">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Số Tài Khoản Mới</label>
                            <input type="text" id="reg-stk" readonly class="w-full px-3 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-slate-700 font-mono font-bold text-center">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Số dư ban đầu (đ)</label>
                            <input type="number" id="reg-bal" class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-slate-800 font-bold" value="5000000">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Mật khẩu tự đặt</label>
                        <input type="password" id="reg-pass" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-slate-800" placeholder="Đặt mật khẩu đăng nhập">
                    </div>
                    <button onclick="authRegister()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-100 transition-all text-sm">
                        Khởi Tạo & Đồng Bộ Đám Mây
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-400"><i class="fa-solid fa-cloud text-indigo-500"></i> Cloud Database Connected</p>
        </div>

        <div id="screen-main" class="flex-1 flex flex-col hidden bg-slate-50">
            <div class="bg-gradient-to-b from-slate-950 to-slate-900 text-white p-5 rounded-b-[2rem] shadow-xl">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center font-black text-sm uppercase" id="user-avatar">?</div>
                        <div>
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest block">Chủ tài khoản</span>
                            <h2 class="text-sm font-black tracking-tight" id="user-name">---</h2>
                        </div>
                    </div>
                    <button onclick="authLogout()" class="p-2 rounded-xl bg-white/5 text-slate-400 hover:text-white-10"><i class="fa-solid fa-power-off text-xs"></i></button>
                </div>

                <div class="bg-gradient-to-br from-indigo-600 via-indigo-700 to-violet-700 rounded-2xl p-5 relative overflow-hidden shadow-lg border border-white/10">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] uppercase font-bold tracking-widest text-indigo-200">Tài khoản Live-Cloud</span>
                        <i class="fa-solid fa-wifi text-emerald-400 text-sm animate-pulse"></i>
                    </div>
                    <div class="mb-4">
                        <p class="text-[10px] text-indigo-200/80">Số dư khả dụng thời gian thực</p>
                        <div class="text-2xl font-black tracking-tight mt-1" id="user-balance">0 VND</div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-[9px] text-indigo-200/60 block">Số tài khoản mạng</span>
                            <span class="font-mono font-bold text-sm tracking-widest" id="user-stk">00000000</span>
                        </div>
                        <button onclick="copyStk()" class="text-[10px] bg-white/10 hover:bg-white/20 px-2 py-1 rounded-md transition-all"><i class="fa-regular fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 px-4 py-4 overflow-y-auto space-y-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200/60 shadow-sm space-y-3">
                    <h3 class="text-xs font-black text-slate-800 uppercase tracking-wider text-indigo-600"><i class="fa-solid fa-paper-plane"></i> Chuyển khoản liên thiết bị</h3>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">STK Người nhận</label>
                        <input type="number" id="tf-stk" oninput="liveCheckRecipient()" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl font-mono font-bold text-slate-800 outline-none" placeholder="Nhập STK thiết bị khác">
                        <p id="tf-name-hint" class="text-[11px] font-bold text-emerald-600 mt-1 hidden"></p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Số tiền (VND)</label>
                        <input type="number" id="tf-val" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none" placeholder="Nhập số tiền chuyển">
                    </div>
                    <button onclick="submitTransfer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-xs uppercase tracking-wider">Gửi tiền ngay</button>
                </div>

                <div class="bg-white p-4 rounded-xl border border-slate-200/60 shadow-sm">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử giao dịch tức thì</h3>
                    <div id="history-container" class="space-y-2 max-h-[180px] overflow-y-auto text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="alert-modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl p-5 w-full max-w-xs text-center shadow-2xl space-y-3">
            <div id="alert-icon" class="text-3xl"></div>
            <h4 id="alert-title" class="font-black text-slate-900 text-sm"></h4>
            <p id="alert-msg" class="text-xs text-slate-500 leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full bg-slate-900 text-white font-bold py-2 rounded-xl text-xs">Đóng</button>
        </div>
    </div>

    <script>
        // Cấu hình Database toàn cầu hoạt động 2026 công khai
        const firebaseConfig = {
            databaseURL: "https://nganhangsimulation-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {
            console.error("Firebase init error", e);
        }
        const db = firebase.database();
        let localUser = null;
        let liveListener = null;

        // Đồng hồ hệ thống
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = String(d.getHours()).padStart(2,'0') + ":" + String(d.getMinutes()).padStart(2,'0');
        }, 1000);

        function toggleAuthMode(mode) {
            document.getElementById('form-login').classList.toggle('hidden', mode !== 'login');
            document.getElementById('form-reg').classList.toggle('hidden', mode !== 'reg');
            document.getElementById('btn-tab-login').className = mode === 'login' ? "flex-1 py-2 text-xs font-bold rounded-lg bg-white text-indigo-600 shadow-sm" : "flex-1 py-2 text-xs font-medium rounded-lg text-slate-500";
            document.getElementById('btn-tab-reg').className = mode === 'reg' ? "flex-1 py-2 text-xs font-bold rounded-lg bg-white text-indigo-600 shadow-sm" : "flex-1 py-2 text-xs font-medium rounded-lg text-slate-500";
            if(mode === 'reg') {
                document.getElementById('reg-stk').value = Math.floor(100000 + Math.random() * 899990);
            }
        }
        toggleAuthMode('login');

        function showAlert(title, msg, isSuccess = true) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-icon').innerHTML = isSuccess ? "<span class='text-emerald-500'>✔</span>" : "<span class='text-rose-500'>❌</span>";
            document.getElementById('alert-modal').classList.remove('hidden');
        }
        function closeAlert() { document.getElementById('alert-modal').classList.add('hidden'); }

        // --- HÀNH ĐỘNG KHỞI TẠO TÀI KHOẢN ---
        function authRegister() {
            const name = document.getElementById('reg-name').value.trim().toUpperCase();
            const stk = document.getElementById('reg-stk').value;
            const bal = parseInt(document.getElementById('reg-bal').value);
            const pass = document.getElementById('reg-pass').value;

            if(!name || !pass || isNaN(bal)) {
                showAlert("Lỗi nhập liệu", "Vui lòng nhập đầy đủ Tên và Mật khẩu.", false);
                return;
            }

            // Ghi dữ liệu lên đám mây
            db.ref('users/' + stk).set({
                name: name, stk: stk, pass: pass, balance: bal,
                history: [{title: "Khởi tạo ví đám mây thành công", val: bal, type: "plus"}]
            }).then(() => {
                showAlert("Đã đồng bộ Đám Mây", "Tài khoản trực tuyến đã sẵn sàng. Hãy dùng STK này để Đăng nhập.", true);
                toggleAuthMode('login');
                document.getElementById('login-stk').value = stk;
            }).catch(err => {
                showAlert("Lỗi máy chủ đám mây", err.message, false);
            });
        }

        // --- HÀNH ĐỘNG ĐĂNG NHẬP ---
        function authLogin() {
            const stk = document.getElementById('login-stk').value.trim();
            const pass = document.getElementById('login-pass').value;

            if(!stk || !pass) {
                showAlert("Lỗi", "Vui lòng nhập số tài khoản và mật khẩu.", false);
                return;
            }

            db.ref('users/' + stk).once('value').then(snapshot => {
                const data = snapshot.val();
                if(data && data.pass === pass) {
                    localUser = data;
                    activateRealtimeSync(stk);
                } else {
                    showAlert("Thất bại", "Số tài khoản hoặc mật khẩu không chính xác.", false);
                }
            }).catch(err => {
                showAlert("Lỗi kết nối mạng", "Không thể liên kết với máy chủ đám mây.", false);
            });
        }

        function activateRealtimeSync(stk) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('hidden');

            liveListener = db.ref('users/' + stk).on('value', snapshot => {
                const updatedData = snapshot.val();
                if(updatedData) {
                    localUser = updatedData;
                    document.getElementById('user-name').innerText = localUser.name;
                    document.getElementById('user-avatar').innerText = localUser.name.charAt(0);
                    document.getElementById('user-balance').innerText = localUser.balance.toLocaleString('vi-VN') + " đ";
                    document.getElementById('user-stk').innerText = localUser.stk;
                    renderLiveHistory(localUser.history);
                }
            });
        }

        function authLogout() {
            if(localUser) db.ref('users/' + localUser.stk).off('value', liveListener);
            localUser = null;
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-auth').classList.remove('hidden');
        }

        function renderLiveHistory(histList) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            if(!histList) return;
            histList.slice().reverse().forEach(h => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center py-1.5 border-b border-slate-100";
                const isPlus = h.type === 'plus';
                div.innerHTML = `<div><p class='font-bold text-slate-700'>${h.title}</p></div><div class='font-bold ${isPlus?'text-emerald-600':'text-rose-600'}'>${isPlus?'+':'-'}${h.val.toLocaleString('vi-VN')}đ</div>`;
                container.appendChild(div);
            });
        }

        function liveCheckRecipient() {
            const targetStk = document.getElementById('tf-stk').value.trim();
            const hint = document.getElementById('tf-name-hint');
            if(targetStk.length >= 5) {
                db.ref('users/' + targetStk).once('value', snapshot => {
                    const data = snapshot.val();
                    if(data) {
                        hint.innerText = "Người nhận: " + data.name;
                        hint.className = "text-[11px] font-bold text-emerald-600 mt-1 block";
                    } else {
                        hint.className = "hidden";
                    }
                });
            } else { hint.className = "hidden"; }
        }

        function submitTransfer() {
            const targetStk = document.getElementById('tf-stk').value.trim();
            const amount = parseInt(document.getElementById('tf-val').value);

            if(!targetStk || isNaN(amount) || amount <= 0) {
                showAlert("Lỗi", "Vui lòng nhập đúng STK và số tiền.", false);
                return;
            }
            if(amount > localUser.balance) {
                showAlert("Lỗi số dư", "Tài khoản của bạn không đủ tiền.", false);
                return;
            }

            db.ref('users/' + targetStk).once('value').then(snapshot => {
                const targetData = snapshot.val();
                if(!targetData) {
                    showAlert("Lỗi người nhận", "Tài khoản thụ hưởng không tồn tại trên hệ thống mạng.", false);
                    return;
                }

                // Trừ tiền bên gửi
                const myHist = localUser.history || [];
                myHist.push({title: `Chuyển tiền đến ${targetData.name}`, val: amount, type: "minus"});
                db.ref('users/' + localUser.stk).update({ balance: localUser.balance - amount, history: myHist });

                // Cộng tiền bên nhận
                const targetHist = targetData.history || [];
                targetHist.push({title: `Nhận tiền từ ${localUser.name}`, val: amount, type: "plus"});
                db.ref('users/' + targetStk).update({ balance: targetData.balance + amount, history: targetHist }).then(() => {
                    showAlert("Thành công", `Đã chuyển khoản thành công ${amount.toLocaleString('vi-VN')}đ.`, true);
                    document.getElementById('tf-stk').value = '';
                    document.getElementById('tf-val').value = '';
                    document.getElementById('tf-name-hint').className = "hidden";
                });
            });
        }

        function copyStk() {
            navigator.clipboard.writeText(localUser.stk);
            showAlert("Đã copy", "Đã lưu số tài khoản vào khay nhớ tạm.", true);
        }
    </script>
</body>
</html>
